<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECRET CODER // PRO EDITION v2.0</title>
    <style>
        :root {
            --neon-green: #00FF41;
            --neon-blue: #00D4FF;
            --neon-purple: #FF00FF;
            --glass-bg: rgba(10, 15, 10, 0.95);
            --glass-border: rgba(0, 255, 65, 0.35);
            --deep-shadow: rgba(0, 0, 0, 0.8);
            --glow: rgba(0, 255, 65, 0.6);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #050705;
            color: var(--neon-green);
            font-family: 'Consolas', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 650px;
            padding: 2.5rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        h1 {
            text-align: center;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--neon-green);
            margin-bottom: 2rem;
            font-size: 1.8rem;
        }

        .form-row { margin-bottom: 1.2rem; }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        select, textarea {
            width: 100%;
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--glass-border);
            color: var(--neon-green);
            padding: 12px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            resize: none;
        }

        select:focus, textarea:focus {
            outline: none;
            border-color: var(--neon-green);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2);
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 1.5rem 0;
        }

        button {
            background: rgba(0,255,65,0.05);
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover { background: var(--neon-green); color: #000; }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 1rem 0;
        }

        .action-grid button { font-size: 0.75rem; padding: 10px 5px; }

        .ai-panel {
            background: rgba(0,212,255,0.05);
            border: 1px solid var(--neon-blue);
            border-radius: 8px;
            padding: 10px;
            margin: 1rem 0;
            font-size: 0.85rem;
        }

        .history-panel {
            max-height: 120px;
            overflow-y: auto;
            border-top: 1px solid #333;
            padding-top: 1rem;
            margin-top: 1rem;
            font-size: 0.8rem;
        }

        .status {
            text-align: center;
            padding: 10px;
            margin-top: 1rem;
            font-size: 0.8rem;
            border-radius: 5px;
            background: rgba(0,255,65,0.05);
        }
        
        #matrix-canvas {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            z-index: -1; 
            pointer-events: none; 
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>

    <div class="container">
        <h1>🔐 SECRET CODER</h1>
        
        <div class="form-row">
            <label>Algorithm</label>
            <select id="algo">
                <option value="custom">🛡️ CUSTOM CIPHER</option>
                <option value="base64">📦 BASE64</option>
                <option value="caesar">🔄 CAESAR</option>
                <option value="hex">🔢 HEX</option>
            </select>
        </div>

        <div class="form-row">
            <label>Input Data</label>
            <textarea id="input" rows="3" placeholder="Enter message..."></textarea>
        </div>

        <div class="controls">
            <button onclick="processData('encode')">ENCODE 🚀</button>
            <button onclick="processData('decode')">DECODE 🔓</button>
        </div>

        <div class="form-row">
            <label>Output</label>
            <textarea id="output" rows="3" readonly placeholder="Output..."></textarea>
        </div>

        <div class="action-grid">
            <button onclick="copyOutput()">📋 COPY</button>
            <button onclick="saveFile()">💾 SAVE</button>
            <button onclick="clearAll()">🧹 CLEAR</button>
            <button onclick="getAiTip()">🤖 AI TIP</button>
        </div>

        <div class="ai-panel" id="ai-panel">
            <strong>🤖 AI Suggestion:</strong> <span id="ai-tip">Click AI TIP...</span>
        </div>

        <div class="history-panel">
            <strong>📜 History Logs:</strong><br>
            <div id="history-box">No operations yet...</div>
        </div>

        <div class="status" id="status">🟢 SYSTEM READY</div>
    </div>

    <script>
        // Matrix Rain Logic
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; 
        canvas.height = window.innerHeight;
        const matrix = "0123456789";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00FF41";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = matrix[Math.floor(Math.random() * matrix.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 33);

        // Existing App Logic
        let historyData = [];

        async function processData(mode) {
            const input = document.getElementById('input').value.trim();
            const algo = document.getElementById('algo').value;
            if (!input) { showStatus('❌ Enter data first!', 'error'); return; }
            showStatus('🔄 Processing...', 'processing');
            
            try {
                const response = await fetch('/process', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({text: input, mode, algo})
                });
                const data = await response.json();
                document.getElementById('output').value = data.result;
                historyData = data.history || [];
                updateHistory();
                showStatus(`✅ COMPLETE`, 'success');
                if (data.ai_tip) document.getElementById('ai-tip').textContent = data.ai_tip;
            } catch (error) { showStatus('❌ Network Error', 'error'); }
        }

        function showStatus(message) { document.getElementById('status').textContent = message; }

        function updateHistory() {
            const histBox = document.getElementById('history-box');
            histBox.innerHTML = historyData.slice(0, 6).map(item => `▸ ${item}`).join('<br>');
        }

        function copyOutput() {
            const output = document.getElementById('output');
            
            if (!output.value) {
                showStatus('❌ Nothing to copy!');
                return;
            }

            // Modern Method try karo
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(output.value)
                    .then(() => showStatus('📋 Copied!'))
                    .catch(() => fallbackCopy(output)); // Agar error aaye toh fallback
            } else {
                // Purana Method (Fallback)
                fallbackCopy(output);
            }
        }

        // Fallback logic
        function fallbackCopy(textarea) {
            try {
                textarea.select(); // Text select karo
                document.execCommand('copy'); // Command force karo
                showStatus('📋 Copied (System Method)!');
            } catch (err) {
                showStatus('❌ Copy failed! Check permissions.');
                console.error('Copy Error:', err);
            }
        }
        function saveFile() {
            const text = document.getElementById('output').value;
            const blob = new Blob([text], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `secret_${Date.now()}.txt`;
            a.click();
        }

        function clearAll() {
            document.getElementById('input').value = '';
            document.getElementById('output').value = '';
            historyData = [];
            document.getElementById('history-box').innerHTML = 'Cleared!';
            showStatus('🧹 Cleared!');
        }

        async function getAiTip() {
            try {
                const response = await fetch('/ai-suggest');
                const data = await response.json();
                document.getElementById('ai-tip').textContent = data.suggestion;
            } catch (e) { showStatus('🤖 AI Loaded!'); }
        }

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') processData('encode');
        });
    </script>
</body>
</html>
